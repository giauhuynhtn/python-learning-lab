<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Recipes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-amber-50 via-white to-teal-50 text-slate-800"
  >
    <div class="mx-auto max-w-lg px-4 py-10">
      <header class="mb-8 text-center">
        <h1 class="text-3xl font-semibold tracking-tight text-slate-900">
          Mood → Recipe
        </h1>
        <p class="mt-2 text-sm text-slate-600">
          Pick how you feel. Get a recipe. Tap “Another” anytime.
        </p>
      </header>

      <section class="rounded-2xl bg-white/80 p-6 shadow-sm ring-1 ring-slate-200/80 backdrop-blur">
        <label for="mood-select" class="block text-sm font-medium text-slate-700"
          >Your mood</label
        >
        <select
          id="mood-select"
          class="mt-2 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-slate-900 shadow-sm focus:border-teal-500 focus:outline-none focus:ring-2 focus:ring-teal-500/30"
        >
          <option value="">Choose one…</option>
        </select>

        <div class="mt-4 flex flex-wrap gap-2" id="mood-chips" aria-hidden="true"></div>

        <button
          type="button"
          id="btn-get"
          class="mt-5 w-full rounded-lg bg-teal-600 px-4 py-2.5 text-sm font-medium text-white shadow hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
          disabled
        >
          Show me a recipe
        </button>
      </section>

      <section
        id="recipe-card"
        class="mt-6 hidden rounded-2xl border border-slate-200/80 bg-white p-6 shadow-sm"
      >
        <h2 id="recipe-title" class="text-xl font-semibold text-slate-900"></h2>
        <p id="recipe-mood" class="mt-1 text-sm capitalize text-teal-700"></p>

        <div class="mt-4">
          <h3 class="text-xs font-semibold uppercase tracking-wide text-slate-500">
            Ingredients
          </h3>
          <ul
            id="recipe-ingredients"
            class="mt-2 list-inside list-disc space-y-1 text-sm text-slate-700"
          ></ul>
        </div>

        <div class="mt-4">
          <h3 class="text-xs font-semibold uppercase tracking-wide text-slate-500">
            Instructions
          </h3>
          <p id="recipe-instructions" class="mt-2 text-sm leading-relaxed text-slate-700"></p>
        </div>

        <button
          type="button"
          id="btn-another"
          class="mt-6 w-full rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-medium text-slate-800 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2"
        >
          Another recipe for this mood
        </button>
        <p id="recipe-message" class="mt-3 hidden text-center text-sm text-amber-800"></p>
      </section>

      <p id="error-banner" class="mt-4 hidden rounded-lg bg-red-50 px-3 py-2 text-sm text-red-800"></p>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
